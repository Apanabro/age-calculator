<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Professional age calculator — find your exact age in years, months, days, and more.">
    <title>Age Calculator</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="header">
            <div class="header-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect x="2" y="4" width="24" height="22" rx="4" stroke="white" stroke-width="1.8" fill="none"/>
                    <line x1="2" y1="10" x2="26" y2="10" stroke="white" stroke-width="1.8"/>
                    <line x1="8" y1="2" x2="8" y2="6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="20" y1="2" x2="20" y2="6" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="14" cy="18" r="3" stroke="white" stroke-width="1.8" fill="none"/>
                </svg>
            </div>
            <h1>Age Calculator</h1>
            <p class="tagline">Your life, precisely measured</p>
        </header>

        <main class="main">
            <div class="input-card" id="inputCard">
                <label class="input-label" for="dob">Date of Birth</label>
                <div class="input-wrapper">
                    <input type="date" id="dob" class="date-input">
                    <div class="input-focus-ring"></div>
                </div>
                <button class="calc-btn" id="calculateBtn" type="button">
                    <span class="btn-text">Calculate</span>
                    <span class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M8 4L14 10L8 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </button>
            </div>

            <div class="error-toast" id="errorToast">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M9 5V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="9" cy="13" r="0.8" fill="currentColor"/>
                </svg>
                <span id="errorMsg">Please select your date of birth</span>
            </div>

            <section class="results" id="results">
                <div class="main-age-card">
                    <div class="age-ring">
                        <svg class="ring-svg" viewBox="0 0 120 120">
                            <circle cx="60" cy="60" r="54" stroke="rgba(255,255,255,0.08)" stroke-width="4" fill="none"/>
                            <circle class="ring-progress" cx="60" cy="60" r="54" stroke="url(#ringGrad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="339.29" stroke-dashoffset="339.29"/>
                            <defs>
                                <linearGradient id="ringGrad" x1="0" y1="0" x2="120" y2="120">
                                    <stop offset="0%" stop-color="#7c5cff"/>
                                    <stop offset="100%" stop-color="#ff6b9d"/>
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="age-ring-content">
                            <span class="age-big-number" id="ageYears">--</span>
                            <span class="age-big-label">years old</span>
                        </div>
                    </div>
                </div>

                <div class="breakdown-grid">
                    <div class="breakdown-item" data-delay="0">
                        <span class="bd-number" id="bdMonths">--</span>
                        <span class="bd-label">Months</span>
                    </div>
                    <div class="breakdown-item" data-delay="1">
                        <span class="bd-number" id="bdDays">--</span>
                        <span class="bd-label">Days</span>
                    </div>
                    <div class="breakdown-item" data-delay="2">
                        <span class="bd-number" id="bdHours">--</span>
                        <span class="bd-label">Hours</span>
                    </div>
                    <div class="breakdown-item" data-delay="3">
                        <span class="bd-number" id="bdMinutes">--</span>
                        <span class="bd-label">Minutes</span>
                    </div>
                </div>

                <div class="info-cards">
                    <div class="info-card" id="nextBirthdayCard">
                        <div class="info-icon next-bday">
                            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                                <path d="M11 2C11 2 4 8 4 13C4 16.866 7.134 20 11 20C14.866 20 18 16.866 18 13C18 8 11 2 11 2Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                <path d="M11 2V14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                                <path d="M8 8L11 6L14 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div class="info-content">
                            <span class="info-value" id="nextBirthday">--</span>
                            <span class="info-label">Until Next Birthday</span>
                        </div>
                    </div>

                    <div class="info-card" id="dayOfWeekCard">
                        <div class="info-icon born-day">
                            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                                <circle cx="11" cy="11" r="9" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                <path d="M11 6V11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div class="info-content">
                            <span class="info-value" id="birthDay">--</span>
                            <span class="info-label">Day of the Week</span>
                        </div>
                    </div>

                    <div class="info-card" id="zodiacCard">
                        <div class="info-icon zodiac">
                            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                                <path d="M11 2L13.5 8.5L20 9L15 13.5L16.5 20L11 16.5L5.5 20L7 13.5L2 9L8.5 8.5L11 2Z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div class="info-content">
                            <span class="info-value" id="zodiacSign">--</span>
                            <span class="info-label">Zodiac Sign</span>
                        </div>
                    </div>

                    <div class="info-card" id="totalDaysCard">
                        <div class="info-icon total">
                            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                                <rect x="3" y="3" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
                                <path d="M3 9H19" stroke="currentColor" stroke-width="1.2"/>
                                <path d="M9 3V19" stroke="currentColor" stroke-width="1.2"/>
                            </svg>
                        </div>
                        <div class="info-content">
                            <span class="info-value" id="totalDays">--</span>
                            <span class="info-label">Total Days Alive</span>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn pdf-btn" id="pdfBtn" type="button">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M4 2H12L16 6V18H4V2Z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
                            <path d="M12 2V6H16" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M10 10H14M10 13H14M10 16H12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        </svg>
                        <span>Download PDF</span>
                    </button>
                    <button class="action-btn share-btn" id="shareBtn" type="button">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="14" cy="4" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="5" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="14" cy="16" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M7.2 8.8L11.8 5.2M7.2 11.2L11.8 14.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span>Share</span>
                    </button>
                    <button class="action-btn copy-btn" id="copyBtn" type="button">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <rect x="6" y="6" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M14 6V4C14 3.44772 13.5523 3 13 3H4C3.44772 3 3 3.44772 3 4V13C3 13.5523 3.44772 14 4 14H6" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <span>Copy</span>
                    </button>
                </div>

                <div class="share-toast" id="shareToast">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M5.5 9L8 11.5L12.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span id="toastMsg">Copied to clipboard!</span>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Made with precision</p>
        </footer>
    </div>

    <div class="bg-glow"></div>
    <div class="bg-glow glow-2"></div>

    <script src="script.js"></script>
</body>
</html>
