<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121222">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Age Master — Your life, precisely measured. Track your age down to the second.">
    <title>Age Master</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <!-- Top App Bar -->
    <header class="top-bar">
        <div class="top-bar-inner">
            <div class="top-bar-logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <rect x="2" y="4" width="16" height="14" rx="3" stroke="white" stroke-width="1.5" fill="none"/>
                        <line x1="2" y1="8" x2="18" y2="8" stroke="white" stroke-width="1.3"/>
                        <line x1="6" y1="2" x2="6" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="14" y1="2" x2="14" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="10" cy="13" r="2.5" stroke="white" stroke-width="1.3" fill="none"/>
                        <line x1="10" y1="11.5" x2="10" y2="13" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="10" y1="13" x2="11.5" y2="14" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="logo-text">Age Master</span>
            </div>
            <div class="top-bar-actions">
                <button class="top-btn" id="topShareBtn" aria-label="Share">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <circle cx="14" cy="4" r="2" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="5" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="14" cy="16" r="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M6.8 8.8L12.2 5.2M6.8 11.2L12.2 14.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Scrollable Content -->
    <main class="main-content" id="mainContent">

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-card glass-card">
                <label class="input-label">Your Name</label>
                <div class="input-wrapper">
                    <input type="text" id="userName" class="date-input" placeholder="Enter your name" autocomplete="name">
                </div>
                <label class="input-label">Date of Birth</label>
                <div class="input-wrapper">
                    <input type="date" id="dob" class="date-input">
                </div>
                <button class="calc-btn" id="calculateBtn" type="button">
                    <span>Calculate</span>
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M7 4L12 9L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="error-toast" id="errorToast">
                <span id="errorMsg">Please select your date of birth</span>
            </div>
        </section>

        <!-- Results Section -->
        <section class="results-section" id="resultsSection">

            <!-- Life Meter -->
            <div class="life-meter glass-card">
                <div class="meter-header">
                    <span class="meter-title">Life Meter</span>
                    <span class="meter-badge live">LIVE</span>
                </div>
                <div class="meter-display">
                    <div class="meter-ring-container">
                        <svg class="meter-ring" viewBox="0 0 140 140">
                            <circle cx="70" cy="70" r="62" stroke="rgba(168,85,247,0.1)" stroke-width="6" fill="none"/>
                            <circle class="meter-ring-progress" cx="70" cy="70" r="62" stroke="url(#meterGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="389.56" stroke-dashoffset="389.56"/>
                            <defs>
                                <linearGradient id="meterGrad" x1="0" y1="0" x2="140" y2="140">
                                    <stop offset="0%" stop-color="#a855f7"/>
                                    <stop offset="100%" stop-color="#ec4899"/>
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="meter-center">
                            <span class="meter-years" id="meterYears">--</span>
                            <span class="meter-years-label">YEARS</span>
                        </div>
                    </div>
                    <div class="meter-live-stats">
                        <div class="live-stat">
                            <span class="live-stat-value" id="liveDays">--</span>
                            <span class="live-stat-label">Days</span>
                        </div>
                        <div class="live-stat">
                            <span class="live-stat-value" id="liveHours">--</span>
                            <span class="live-stat-label">Hours</span>
                        </div>
                        <div class="live-stat">
                            <span class="live-stat-value" id="liveMinutes">--</span>
                            <span class="live-stat-label">Minutes</span>
                        </div>
                        <div class="live-stat highlight">
                            <span class="live-stat-value" id="liveSeconds">--</span>
                            <span class="live-stat-label">Seconds</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Breakdown Cards -->
            <div class="breakdown-row">
                <div class="breakdown-card glass-card">
                    <span class="bd-value" id="bdMonths">--</span>
                    <span class="bd-label">Months</span>
                </div>
                <div class="breakdown-card glass-card">
                    <span class="bd-value" id="bdDays">--</span>
                    <span class="bd-label">Days</span>
                </div>
                <div class="breakdown-card glass-card">
                    <span class="bd-value" id="bdHours">--</span>
                    <span class="bd-label">Hours</span>
                </div>
                <div class="breakdown-card glass-card">
                    <span class="bd-value" id="bdMinutes">--</span>
                    <span class="bd-label">Minutes</span>
                </div>
            </div>

            <!-- Birthday Countdown -->
            <div class="countdown-card glass-card">
                <div class="countdown-header">
                    <div class="countdown-icon">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                            <path d="M11 2C11 2 4 8 4 13C4 16.866 7.134 20 11 20C14.866 20 18 16.866 18 13C18 8 11 2 11 2Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M11 2V14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            <path d="M8 8L11 6L14 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="countdown-info">
                        <span class="countdown-title">Next Birthday</span>
                        <span class="countdown-value" id="nextBirthday">--</span>
                    </div>
                </div>
                <div class="countdown-bar-track">
                    <div class="countdown-bar-fill" id="countdownFill"></div>
                </div>
            </div>

            <!-- Life Insights -->
            <div class="insights-grid">
                <div class="insight-card glass-card">
                    <div class="insight-icon cyan">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M10 5V10L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="insight-content">
                        <span class="insight-value" id="birthDay">--</span>
                        <span class="insight-label">Born On</span>
                    </div>
                </div>
                <div class="insight-card glass-card">
                    <div class="insight-icon gold">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 2L12.5 7.5L18 8L14 12L15.5 18L10 15L4.5 18L6 12L2 8L7.5 7.5L10 2Z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="insight-content">
                        <span class="insight-value" id="zodiacSign">--</span>
                        <span class="insight-label">Zodiac</span>
                    </div>
                </div>
                <div class="insight-card glass-card">
                    <div class="insight-icon purple">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M3 8H17" stroke="currentColor" stroke-width="1.2"/>
                            <path d="M8 3V17" stroke="currentColor" stroke-width="1.2"/>
                        </svg>
                    </div>
                    <div class="insight-content">
                        <span class="insight-value" id="totalDays">--</span>
                        <span class="insight-label">Total Days</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-row">
                <button class="action-btn pdf-btn" id="pdfBtn" type="button">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M4 2H11L15 6V16H4V2Z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
                        <path d="M11 2V6H15" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                        <path d="M9 9H13M9 12H13M9 15H11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                    <span>PDF</span>
                </button>
                <button class="action-btn share-btn" id="shareBtn" type="button">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <circle cx="13" cy="4" r="2" stroke="currentColor" stroke-width="1.3"/>
                        <circle cx="5" cy="9" r="2" stroke="currentColor" stroke-width="1.3"/>
                        <circle cx="13" cy="14" r="2" stroke="currentColor" stroke-width="1.3"/>
                        <path d="M6.5 7.8L11.5 5.2M6.5 10.2L11.5 12.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    <span>Share</span>
                </button>
                <button class="action-btn copy-btn" id="copyBtn" type="button">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <rect x="5" y="5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.3" fill="none"/>
                        <path d="M13 5V4C13 3.44772 12.5523 3 12 3H4C3.44772 3 3 3.44772 3 4V12C3 12.5523 3.44772 13 4 13H5" stroke="currentColor" stroke-width="1.3"/>
                    </svg>
                    <span>Copy</span>
                </button>
            </div>

            <!-- Toast -->
            <div class="toast" id="toast">
                <span id="toastMsg">Copied!</span>
            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-tab="home" id="navHome">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <path d="M3 9L11 3L19 9V19C19 19.5523 18.5523 20 18 20H4C3.44772 20 3 19.5523 3 19V9Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M9 20V12H13V20" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span>Home</span>
        </button>
        <button class="nav-item" data-tab="stats" id="navStats">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <rect x="3" y="12" width="3" height="7" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/>
                <rect x="8" y="8" width="3" height="11" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/>
                <rect x="13" y="4" width="3" height="15" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/>
                <rect x="18" y="2" width="0" height="0" rx="0" stroke="currentColor" stroke-width="1.3" fill="none"/>
            </svg>
            <span>Stats</span>
        </button>
        <button class="nav-item" data-tab="settings" id="navSettings">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                <circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
                <path d="M11 2V5M11 17V20M2 11H5M17 11H20M4.2 4.2L6.3 6.3M15.7 15.7L17.8 17.8M17.8 4.2L15.7 6.3M6.3 15.7L4.2 17.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Settings</span>
        </button>
    </nav>

    <!-- Hidden Print Certificate -->
    <div id="printCert" style="display:none;"></div>

    <div class="bg-glow"></div>
    <div class="bg-glow glow-2"></div>

    <script src="script.js?v=8"></script>
</body>
</html>
