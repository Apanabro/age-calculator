<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121222">
    <title>Dashboard - Age Master</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
    <style>
        .dash-card { padding: 28px 24px; margin-bottom: 16px; }
        .profile-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #a855f7, #ec4899); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: #fff; flex-shrink: 0; }
        .profile-info h2 { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 2px; }
        .profile-info p { font-size: 13px; color: rgba(255,255,255,0.45); }
        .plan-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
        .plan-badge.free { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.08); }
        .plan-badge.premium { background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(236,72,153,0.2)); color: #ec4899; border: 1px solid rgba(236,72,153,0.3); }
        .plan-badge.premium::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #ec4899; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
        .stat-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px 14px; text-align: center; }
        .stat-value { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
        .dash-btn { width: 100%; height: 52px; border: none; border-radius: 12px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; margin-bottom: 10px; }
        .dash-btn:active { transform: scale(0.97); }
        .dash-btn.primary { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; box-shadow: 0 4px 20px rgba(168,85,247,0.35); }
        .dash-btn.secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.08); }
        .dash-btn.danger { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.15); }
        .feature-list { margin-bottom: 24px; }
        .feature-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .feature-item:last-child { border-bottom: none; }
        .feature-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .feature-icon.green { background: rgba(34,197,94,0.1); color: #22c55e; }
        .feature-icon.yellow { background: rgba(251,191,36,0.1); color: #fbbf24; }
        .feature-icon.purple { background: rgba(168,85,247,0.1); color: #a855f7; }
        .feature-text { flex: 1; }
        .feature-text h4 { font-size: 13px; font-weight: 700; color: #fff; }
        .feature-text p { font-size: 11px; color: rgba(255,255,255,0.35); }
        .feature-status { font-size: 11px; font-weight: 700; }
        .feature-status.on { color: #22c55e; }
        .feature-status.off { color: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <div class="auth-bg">
        <div class="bg-glow"></div>
        <div class="bg-glow glow-2"></div>
    </div>

    <div class="auth-container" style="padding-top:40px;">
        <div class="dash-card glass-card">
            <div class="profile-row">
                <div class="avatar" id="userAvatar">?</div>
                <div class="profile-info">
                    <h2 id="userName">User</h2>
                    <p id="userEmail">user@email.com</p>
                </div>
            </div>

            <div id="planBadge" class="plan-badge free">FREE PLAN</div>

            <div class="stat-grid" style="margin-top:20px;">
                <div class="stat-item">
                    <div class="stat-value" id="statAge">--</div>
                    <div class="stat-label">Age (years)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statDays">--</div>
                    <div class="stat-label">Total Days</div>
                </div>
            </div>

            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon green"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 9L7.5 12.5L14 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                    <div class="feature-text"><h4>Age Calculator</h4><p>Real-time life meter & insights</p></div>
                    <span class="feature-status on">ACTIVE</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon green"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="13" cy="4" r="2" stroke="currentColor" stroke-width="1.3"/><circle cx="5" cy="9" r="2" stroke="currentColor" stroke-width="1.3"/><circle cx="13" cy="14" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 7.8L11.5 5.2M6.5 10.2L11.5 12.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></div>
                    <div class="feature-text"><h4>Share & Copy</h4><p>Share results with friends</p></div>
                    <span class="feature-status on">ACTIVE</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon purple" id="pdfFeatureIcon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 2H11L15 6V16H4V2Z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/><path d="M11 2V6H15" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg></div>
                    <div class="feature-text"><h4>PDF Certificate</h4><p>Download professional certificate</p></div>
                    <span class="feature-status" id="pdfStatus">PRO</span>
                </div>
            </div>

            <button class="dash-btn primary" onclick="window.location.href='index.html'">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 4L12 9L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>Open Calculator</span>
            </button>
            <button class="dash-btn danger" id="logoutBtn">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M6 3H4C3.44772 3 3 3.44772 3 4V14C3 14.5523 3.44772 15 4 15H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M12 9L7 9M12 9L10 7M12 9L10 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>Sign Out</span>
            </button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        var session = null;
        try { session = JSON.parse(localStorage.getItem('ageMaster_session')); } catch(e) {}
        if (!session || !session.loggedIn) {
            window.location.href = 'login.html';
            return;
        }

        var isPremium = false;
        try {
            var p = localStorage.getItem('ageMaster_premium');
            isPremium = (p === 'true' || p === 'lifetime');
            if (session.email === 'jy306648@gmail.com') {
                isPremium = true;
                localStorage.setItem('ageMaster_premium', 'lifetime');
            }
        } catch(ex) {}

        document.getElementById('userName').textContent = session.name || 'User';
        document.getElementById('userEmail').textContent = session.email || '';
        document.getElementById('userAvatar').textContent = (session.name || 'U').charAt(0).toUpperCase();

        var badge = document.getElementById('planBadge');
        if (isPremium) {
            badge.className = 'plan-badge premium';
            badge.textContent = 'PREMIUM';
            document.getElementById('pdfStatus').textContent = 'ACTIVE';
            document.getElementById('pdfStatus').className = 'feature-status on';
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('ageMaster_session');
            window.location.href = 'login.html';
        });
    })();
    </script>
</body>
</html>
