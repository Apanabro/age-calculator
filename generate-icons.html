<!DOCTYPE html>
<html>
<head>
    <title>Generate PNG Icons</title>
    <style>body{font-family:sans-serif;padding:40px;background:#111;color:#fff;}button{padding:12px 24px;background:#7c5cff;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:8px 0;}p{margin:12px 0;color:#aaa;}</style>
</head>
<body>
    <h2>Icon Generator</h2>
    <p>Open this page in a browser, click the buttons below, and save the generated PNG files as icon-192.png and icon-512.png in the same folder.</p>
    <button onclick="generate(192)">Generate 192x192</button>
    <button onclick="generate(512)">Generate 512x512</button>
    <canvas id="c"></canvas>
    <script>
        function generate(size) {
            const canvas = document.getElementById('c');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#7c5cff');
            grad.addColorStop(1, '#ff6b9d');

            const r = size * 0.22;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, r);
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineCap = 'round';

            const s = size / 512;
            ctx.lineWidth = 12 * s;

            const cx = size / 2, cy = size / 2;

            ctx.beginPath();
            ctx.roundRect(cx - 100*s, cy - 70*s, 200*s, 170*s, 20*s);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(cx - 100*s, cy - 30*s);
            ctx.lineTo(cx + 100*s, cy - 30*s);
            ctx.lineWidth = 10 * s;
            ctx.stroke();

            ctx.lineWidth = 12 * s;
            ctx.beginPath();
            ctx.moveTo(cx - 55*s, cy - 95*s);
            ctx.lineTo(cx - 55*s, cy - 60*s);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx + 55*s, cy - 95*s);
            ctx.lineTo(cx + 55*s, cy - 60*s);
            ctx.stroke();

            ctx.lineWidth = 8 * s;
            ctx.beginPath();
            ctx.arc(cx, cy + 20*s, 35*s, 0, Math.PI * 2);
            ctx.stroke();

            ctx.lineWidth = 7 * s;
            ctx.beginPath();
            ctx.moveTo(cx, cy + 20*s);
            ctx.lineTo(cx, cy);
            ctx.stroke();

            ctx.lineWidth = 6 * s;
            ctx.beginPath();
            ctx.moveTo(cx, cy + 20*s);
            ctx.lineTo(cx + 15*s, cy + 30*s);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy + 20*s, 4*s, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.fill();

            const link = document.createElement('a');
            link.download = 'icon-' + size + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
