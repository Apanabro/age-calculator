<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121222">
    <title>Login - Age Master</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-bg">
        <div class="bg-glow"></div>
        <div class="bg-glow glow-2"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 20 20" fill="none">
                        <rect x="2" y="4" width="16" height="14" rx="3" stroke="white" stroke-width="1.5" fill="none"/>
                        <line x1="2" y1="8" x2="18" y2="8" stroke="white" stroke-width="1.3"/>
                        <line x1="6" y1="2" x2="6" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="14" y1="2" x2="14" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="10" cy="13" r="2.5" stroke="white" stroke-width="1.3" fill="none"/>
                        <line x1="10" y1="11.5" x2="10" y2="13" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="10" y1="13" x2="11.5" y2="14" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1 class="auth-title">Age Master</h1>
                <p class="auth-subtitle">Welcome back</p>
            </div>

            <form id="loginForm" class="auth-form" autocomplete="on">
                <div class="field">
                    <label class="field-label">Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M2 6L9 11L16 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                        <input type="email" id="loginEmail" class="auth-input" placeholder="your@email.com" required autocomplete="email">
                    </div>
                </div>
                <div class="field">
                    <label class="field-label">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="8" width="12" height="8" rx="2" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M6 8V5C6 3.34315 7.34315 2 9 2C10.6569 2 12 3.34315 12 5V8" stroke="currentColor" stroke-width="1.3" fill="none"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/></svg>
                        <input type="password" id="loginPassword" class="auth-input" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                </div>

                <div class="error-msg" id="loginError"></div>

                <button type="submit" class="auth-btn">
                    <span>Sign In</span>
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M7 4L12 9L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        var API_BASE = (location.hostname === 'localhost' || location.protocol === 'file:')
            ? 'http://localhost:3000/api' : 'https://age-calculator-zybq.onrender.com/api';

        var session = null;
        try { session = JSON.parse(localStorage.getItem('ageMaster_session')); } catch(e) {}
        if (session && session.loggedIn) {
            window.location.href = 'dashboard.html';
            return;
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('loginEmail').value.trim().toLowerCase();
            var password = document.getElementById('loginPassword').value;
            var errEl = document.getElementById('loginError');
            errEl.textContent = '';
            errEl.style.display = 'none';

            if (!email || !password) {
                errEl.textContent = 'Please fill in all fields';
                errEl.style.display = 'block';
                return;
            }

            fetch(API_BASE + '/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.error) {
                    errEl.textContent = data.error;
                    errEl.style.display = 'block';
                    return;
                }
                var isPremium = (email === 'jy306648@gmail.com') || data.user.isPremium;
                localStorage.setItem('ageMaster_session', JSON.stringify({
                    name: data.user.name, email: email, loggedIn: true
                }));
                if (isPremium) localStorage.setItem('ageMaster_premium', 'lifetime');
                window.location.href = 'dashboard.html';
            }).catch(function() {
                var users = [];
                try { users = JSON.parse(localStorage.getItem('ageMaster_users')) || []; } catch(ex) { users = []; }
                var user = users.find(function(u) { return u.email === email; });
                if (!user) { errEl.textContent = 'No account found with this email'; errEl.style.display = 'block'; return; }
                if (btoa(password) !== user.passwordHash) { errEl.textContent = 'Incorrect password'; errEl.style.display = 'block'; return; }
                var isPremium = (email === 'jy306648@gmail.com');
                try { var ex = localStorage.getItem('ageMaster_premium'); if (ex === 'true' || ex === 'lifetime') isPremium = true; } catch(ex2) {}
                localStorage.setItem('ageMaster_session', JSON.stringify({ name: user.name, email: email, loggedIn: true }));
                if (isPremium) localStorage.setItem('ageMaster_premium', 'lifetime');
                window.location.href = 'dashboard.html';
            });
        });
    })();
    </script>
</body>
</html>
